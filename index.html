<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            text-align: center;
            padding: 20px;
            background-color: #007bff;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
        }
        .controls {
            text-align: center;
            margin: 20px;
        }
        select {
            padding: 10px;
            font-size: 1rem;
        }
        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #007bff;
            color: white;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #e9ecef;
        }
        footer {
            text-align: center;
            padding: 10px;
            font-size: 0.8rem;
            color: #666;
            background-color: #f1f1f1;
            margin-top: 20px;
            border-top: 1px solid #ddd;
        }
        #loadMoreBtn {
            display: none;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #loadMoreBtn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>Leaderboard Rankings</h1>
    </header>

    <div class="controls">
        <label for="leaderboardType">Select Leaderboard:</label>
        <select id="leaderboardType" onchange="fetchLeaderboard(true)">
            <option value="HIGH_SCORE_ALL">Lifetime Ranking</option>
            <option value="HIGH_SCORE_MONTH">Monthly Ranking</option>
            <option value="HIGH_SCORE_SPEED">Monthly Speed Ranking</option>
        </select>
    </div>

    <main>
        <table>
            <thead id="tableHead">
                <tr>
                    <th>Rank</th>
                    <th>Username</th>
                    <th id="levelHeader">Level</th>
                    <th id="damageHeader">Damage</th>
                    <th>Time</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="leaderboard">
                <tr>
                    <td colspan="6">Loading data...</td>
                </tr>
            </tbody>
        </table>
        <button id="loadMoreBtn" onclick="loadMoreEntries()">Load More</button>
    </main>

    <footer>
        &copy; 2024 EasyPong Leaderboard
    </footer>

<script>
    const apiBaseUrl = 'https://easypong-leaderboard.netlify.app/.netlify/functions/leaderboard';

    const levelMapping = [
        "Beginner 1", "Beginner 2", "Beginner 3", "Beginner 4",
        "Advanced 1", "Advanced 2", "Advanced 3", "Advanced 4", "Advanced 5",
        "Expert 1", "Expert 2", "Expert 3", "Expert 4"
    ];

    let nextPageUrl = null;

    function isOddMonth() {
        // JavaScript の getMonth() は 0始まりなので +1 する
        const month = new Date().getMonth() + 1;
        return month % 2 === 1;
    }

    function getLeaderboardApiName(selectedType) {
        const odd = isOddMonth();

        if (selectedType === "HIGH_SCORE_MONTH") {
            return odd ? "HIGH_SCORE_MONTH_ODD" : "HIGH_SCORE_MONTH";
        }

        if (selectedType === "HIGH_SCORE_SPEED") {
            return odd ? "HIGH_SCORE_SPEED_ODD" : "HIGH_SCORE_SPEED";
        }

        return "HIGH_SCORE_ALL";
    }

    function buildApiUrl(apiName) {
        return `${apiBaseUrl}?api_name=${encodeURIComponent(apiName)}&limit=50`;
    }

    function formatDate(timestamp, includeYear = false) {
        const date = new Date(timestamp * 1000);
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');

        return includeYear ? `${year}/${month}/${day}` : `${month}/${day}`;
    }

    function formatSpeedTime(score) {
        const timePoint = parseInt(score, 10);
        const rallyTimeInMilliseconds = 3600000 - timePoint;
        const minutes = Math.floor(rallyTimeInMilliseconds / 60000);
        const seconds = Math.floor((rallyTimeInMilliseconds % 60000) / 1000);
        const milliseconds = rallyTimeInMilliseconds % 1000;

        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(milliseconds).padStart(3, '0')}`;
    }

    function isCurrentMonthEntry(timestamp) {
        if (!timestamp) return false;

        const entryDate = new Date(timestamp * 1000);
        const now = new Date();

        return entryDate.getFullYear() === now.getFullYear()
            && entryDate.getMonth() === now.getMonth();
    }

    function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, char => {
            const map = {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            };
            return map[char];
        });
    }

    function fetchLeaderboard(reset = true) {
        const selectedType = document.getElementById('leaderboardType').value;
        const apiName = getLeaderboardApiName(selectedType);

        if (reset) {
            nextPageUrl = null;
        }

        let apiUrl = buildApiUrl(apiName);

        if (!reset && nextPageUrl) {
            apiUrl = nextPageUrl;
        }

        const isSpeedRanking = selectedType === "HIGH_SCORE_SPEED";
        const isMonthlyRanking = selectedType === "HIGH_SCORE_MONTH";

        document.getElementById('levelHeader').style.display = isSpeedRanking ? "none" : "table-cell";
        document.getElementById('damageHeader').style.display = isSpeedRanking ? "none" : "table-cell";

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                const leaderboardData = Array.isArray(data) ? data : (data.data || []);
                const leaderboard = document.getElementById('leaderboard');

                if (reset) {
                    leaderboard.innerHTML = '';
                }

                let displayedCount = 0;

                leaderboardData.forEach(entry => {
                    // 偶数月・奇数月でボードを分けても、同じボードは2か月後に再利用される。
                    // そのため Monthly / Speed は現在月のデータだけ表示する。
                    if ((isMonthlyRanking || isSpeedRanking) && !isCurrentMonthEntry(entry.timestamp)) {
                        return;
                    }

                    const score = parseInt(entry.score, 10);
                    const formattedDate = entry.timestamp
                        ? formatDate(entry.timestamp, selectedType === "HIGH_SCORE_ALL")
                        : "N/A";

                    let timeValue = "";
                    let levelColumn = "";
                    let damageColumn = "";

                    if (isSpeedRanking) {
                        timeValue = formatSpeedTime(score);
                    } else {
                        const levelIndex = Math.floor(score / 1000000);
                        const level = levelMapping[levelIndex] || "Unknown";

                        const life = Math.floor((score % 1000000) / 10000);
                        const damage = 11 - life;

                        levelColumn = `<td>${escapeHtml(level)}</td>`;
                        damageColumn = `<td>${escapeHtml(damage)}</td>`;

                        const timePoint = score % 10000;
                        const rallyTimeInSeconds = 3600 - timePoint;
                        const minutes = Math.floor(rallyTimeInSeconds / 60);
                        const seconds = rallyTimeInSeconds % 60;

                        timeValue = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                    }

                    const userName = entry.user?.display_name || entry.user?.alias || "Unknown";

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${escapeHtml(entry.rank)}</td>
                        <td>${escapeHtml(userName)}</td>
                        ${isSpeedRanking ? "" : levelColumn}
                        ${isSpeedRanking ? "" : damageColumn}
                        <td>${escapeHtml(timeValue)}</td>
                        <td>${escapeHtml(formattedDate)}</td>
                    `;

                    leaderboard.appendChild(row);
                    displayedCount++;
                });

                if (displayedCount === 0) {
                    leaderboard.innerHTML = `
                        <tr>
                            <td colspan="6">No entries for this month yet.</td>
                        </tr>
                    `;
                }

                // 今の Netlify Function は配列を返す形なので、基本的には nextPageUrl は null のまま。
                // data.paging.next が返る形に戻した場合だけ Load More が有効になる。
                nextPageUrl = Array.isArray(data) ? null : (data.paging?.next || null);

                const loadMoreBtn = document.getElementById("loadMoreBtn");
                loadMoreBtn.style.display = nextPageUrl ? "block" : "none";
            })
            .catch(error => {
                console.error('Failed to fetch leaderboard data:', error);
                document.getElementById('leaderboard').innerHTML = `
                    <tr>
                        <td colspan="6">Failed to load data. Please try again later.</td>
                    </tr>
                `;
            });
    }

    function loadMoreEntries() {
        fetchLeaderboard(false);
    }

    document.addEventListener("DOMContentLoaded", () => fetchLeaderboard(true));
</script>

</body>
</html>
